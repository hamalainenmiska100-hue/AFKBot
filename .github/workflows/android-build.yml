name: Android Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect Android project
        id: android_check
        run: |
          if [ -d android ] && [ -f android/gradlew ]; then
            echo "has_android=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_android=false" >> "$GITHUB_OUTPUT"
            echo "No Android project found (missing android/gradlew). Skipping Android build."
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Java
        if: steps.android_check.outputs.has_android == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Make Gradle wrapper executable
        if: steps.android_check.outputs.has_android == 'true'
        run: chmod +x android/gradlew

      - name: Build Android release APK
        if: steps.android_check.outputs.has_android == 'true'
        working-directory: android
        run: ./gradlew assembleRelease
